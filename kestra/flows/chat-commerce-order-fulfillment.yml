id: chat-commerce-order-fulfillment
namespace: demo.commerce
description: Fulfillment workflow triggered after the chat agent creates an order.

inputs:
  - id: orderId
    type: STRING
  - id: total
    type: FLOAT
  - id: shippingMethod
    type: STRING
    defaults: standard

tasks:
  - id: validate_order
    type: io.kestra.plugin.core.log.Log
    message: "Validating order {{ inputs.orderId }} for ${{ inputs.total }}"

  - id: reserve_inventory
    type: io.kestra.plugin.core.log.Log
    message: "Reserving inventory for {{ inputs.orderId }}"

  - id: capture_payment
    type: io.kestra.plugin.core.log.Log
    message: "Capturing payment for {{ inputs.orderId }}"

  - id: fulfillment_event
    type: io.kestra.plugin.core.log.Log
    message: "Order {{ inputs.orderId }} queued for {{ inputs.shippingMethod }} shipping"
