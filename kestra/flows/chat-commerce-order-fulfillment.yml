id: chat-commerce-order-fulfillment
namespace: demo.commerce
description: Post-order workflow triggered after Shopify checkout creates a paid order.

inputs:
  - id: orderId
    type: STRING
  - id: total
    type: FLOAT
  - id: shippingMethod
    type: STRING
    defaults: standard
  - id: workflowEvent
    type: STRING
    defaults: shopify.orders.paid
  - id: cartId
    type: STRING
    required: false
  - id: checkoutUrl
    type: STRING
    required: false

tasks:
  - id: receive_shopify_event
    type: io.kestra.plugin.core.log.Log
    message: "Received {{ inputs.workflowEvent }} for {{ inputs.orderId }} from Shopify checkout"

  - id: enrich_order_context
    type: io.kestra.plugin.core.log.Log
    message: "Enriching {{ inputs.orderId }} with chat intent, cart {{ inputs.cartId }}, and concierge attribution"

  - id: notify_merchant_ops
    type: io.kestra.plugin.core.log.Log
    message: "Notifying merchant ops team about paid Shopify order {{ inputs.orderId }}"

  - id: sync_downstream_systems
    type: io.kestra.plugin.core.log.Log
    message: "Syncing {{ inputs.orderId }} to warehouse, CRM, analytics, and Postgres audit trail"
