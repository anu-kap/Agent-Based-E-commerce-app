name: CD — Services

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "infra/k8s/**"
      - ".github/workflows/cd-services.yml"

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: acme-prod

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog-service, payment-service, order-service, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t ${{ env.ECR_REGISTRY }}/acme/${{ matrix.service }}:${IMAGE_TAG} \
            -t ${{ env.ECR_REGISTRY }}/acme/${{ matrix.service }}:latest \
            ./services/${{ matrix.service }}
          docker push ${{ env.ECR_REGISTRY }}/acme/${{ matrix.service }}:${IMAGE_TAG}
          docker push ${{ env.ECR_REGISTRY }}/acme/${{ matrix.service }}:latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          IMAGE_TAG=${{ github.sha }}
          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}=${{ env.ECR_REGISTRY }}/acme/${{ matrix.service }}:${IMAGE_TAG} \
            -n acme-prod
          kubectl rollout status deployment/${{ matrix.service }} -n acme-prod --timeout=300s
