name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog-service, payment-service, order-service, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          if [ -d "services/${{ matrix.service }}/tests" ]; then
            pytest services/${{ matrix.service }}/tests/ -v
          else
            echo "No tests found for ${{ matrix.service }}, skipping."
          fi

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: storefront-ui/package.json

      - name: Install dependencies
        working-directory: storefront-ui
        run: npm install

      - name: Type-check
        working-directory: storefront-ui
        run: npx tsc --noEmit
