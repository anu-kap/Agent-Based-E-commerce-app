# Pings the Render free-tier deploy every ~10 minutes so it never
# hits the 15-minute idle threshold that triggers a spin-down.
# Cost: $0 — GitHub Actions on public repos has no minute cap.
#
# To disable: delete this file (or comment out the schedule below).
name: Keep Warm

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:          # also lets you run it on-demand from the Actions tab

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Hit /health
        run: |
          set -euo pipefail
          curl -fsS --max-time 45 \
            https://storefront-concierge.onrender.com/health
