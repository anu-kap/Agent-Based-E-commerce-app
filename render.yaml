# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy with: New + Blueprint, point at this repo.
#
# Free tier notes:
# - The web service uses Render's free plan: 512MB RAM, 0.1 CPU, no
#   credit card required. It spins down after 15 minutes of inactivity
#   and cold-starts in ~30s on the next request. Fine for a portfolio
#   demo; upgrade to `starter` if you need always-on.
# - Postgres is intentionally NOT defined here. The app does not read
#   from a database today (schema lives in db/init/ for when MCP tools
#   start persisting). Add a Render Postgres later from the dashboard
#   if you need one — Render's free Postgres requires payment info on
#   file even though it costs $0.
# - Kestra is also not deployed (needs 2GB+ RAM + Postgres-backed
#   queues). Run `docker compose up kestra` locally to demo the
#   workflow trigger; the app reports "Kestra unavailable" otherwise.
services:
  - type: web
    name: storefront-concierge
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "3000"
      - key: SHOPIFY_STORE_DOMAIN
        value: thekohawkshop.com
      - key: KESTRA_URL
        value: http://localhost:8080
      - key: KESTRA_NAMESPACE
        value: demo.commerce
      - key: KESTRA_FLOW_ID
        value: chat-commerce-order-fulfillment
      - key: KESTRA_RADAR_FLOW_ID
        value: campus-demand-radar
