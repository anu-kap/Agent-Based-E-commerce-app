apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: acme-prod
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "acme-payment"
    vault.hashicorp.com/agent-inject-secret-shopify: "vault/prod/acme/shopify"
    vault.hashicorp.com/agent-inject-template-shopify: |
      {{ with secret "vault/prod/acme/shopify" -}}
      SHOPIFY_STORE_DOMAIN={{ .Data.data.store_domain }}
      SHOPIFY_ACCESS_TOKEN={{ .Data.data.access_token }}
      {{- end }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ${ECR_REGISTRY}/acme/payment-service:${IMAGE_TAG}
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: acme-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: seed-catalog
              mountPath: /app/data
      volumes:
        - name: seed-catalog
          configMap:
            name: seed-catalog-data
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: acme-prod
spec:
  selector:
    app: payment-service
  ports:
    - port: 8002
      targetPort: 8002
