# ExternalSecrets CRs — sync Vault KV paths to Kubernetes Secrets.
# Requires the External Secrets Operator installed in the cluster.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.acme.internal"
      path: "vault/prod/acme"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "acme-external-secrets"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: acme-shopify
  namespace: acme-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: acme-shopify-secret
  data:
    - secretKey: SHOPIFY_STORE_DOMAIN
      remoteRef:
        key: shopify
        property: store_domain
    - secretKey: SHOPIFY_ACCESS_TOKEN
      remoteRef:
        key: shopify
        property: access_token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: acme-postgres
  namespace: acme-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: acme-postgres-secret
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: postgres
        property: url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: acme-redis
  namespace: acme-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: acme-redis-secret
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: redis
        property: url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: acme-aws
  namespace: acme-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: acme-aws-secret
  data:
    - secretKey: SQS_ORDER_EVENTS_URL
      remoteRef:
        key: aws
        property: sqs_order_events_url
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: aws
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: aws
        property: secret_access_key
