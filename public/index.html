<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic Commerce Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="Agentic commerce workspace">
        <aside class="rail" aria-label="System status">
          <div>
            <p class="eyebrow">Campus Store Concierge</p>
            <h1>Turn school spirit intent into Shopify carts.</h1>
          </div>
          <div class="stack">
            <div class="status">
              <span class="dot"></span>
              <span>Live Kohawk Shop catalog via Shopify MCP</span>
            </div>
            <div class="status">
              <span class="dot"></span>
              <span>Product cards, prices, images, cart actions</span>
            </div>
            <div class="status">
              <span class="dot muted"></span>
              <span>Kestra for post-order merchant workflows</span>
            </div>
          </div>
          <div class="metrics">
            <div><strong>Live</strong><span>Shopify</span></div>
            <div><strong>Cart</strong><span>Ready</span></div>
            <div><strong>Ops</strong><span>Kestra</span></div>
          </div>
        </aside>

        <section class="chat-panel">
          <header class="chat-header">
            <div>
              <p class="eyebrow">Live Campus Store Demo</p>
              <h2>The Kohawk Shop concierge</h2>
            </div>
            <button id="reset" type="button" title="Reset conversation">Reset</button>
          </header>

          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="chat-form" class="composer">
            <input
              id="message"
              name="message"
              type="text"
              autocomplete="off"
              placeholder="Ask for campus gear, alumni gifts, pickup needs..."
              required
            />
            <button type="submit">Send</button>
          </form>

          <div class="suggestions" aria-label="Example prompts">
            <button type="button">Find a hoodie for an alum</button>
            <button type="button">Find a campus mug</button>
            <button type="button">Add the best option to my cart</button>
            <button type="button">Checkout in Shopify</button>
            <button type="button">Simulate order paid</button>
          </div>
        </section>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
